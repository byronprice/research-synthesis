base_model: "unsloth/Meta-Llama-3.1-8B-Instruct"
output_dir: "outputs/llama-3.1-8b-neuro"

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  max_seq_length: 4096
  load_in_4bit: true
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  fp16: false
  bf16: true
  logging_steps: 10
  save_steps: 200
  eval_steps: 200
  save_total_limit: 3
  seed: 42

data:
  train_file: "data/training_data/combined_train.jsonl"
  val_split: 0.05
